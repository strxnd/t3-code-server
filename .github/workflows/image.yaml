name: image

on:
  push:
    branches:
      - main
    tags:
      - "*"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/strxnd/t3-code-server

jobs:
  image:
    name: Build and publish image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build smoke-test image
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: ${{ env.IMAGE_NAME }}:smoke
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test image
        run: |
          set -eux
          docker run --rm "${IMAGE_NAME}:smoke" t3 --version
          docker run --rm "${IMAGE_NAME}:smoke" codex --version
          docker run --rm "${IMAGE_NAME}:smoke" claude --version
          docker run --rm "${IMAGE_NAME}:smoke" opencode --version
          docker run --rm "${IMAGE_NAME}:smoke" gh --version
          docker run --rm "${IMAGE_NAME}:smoke" git --version
          docker run --rm "${IMAGE_NAME}:smoke" nano --version
          docker run --rm "${IMAGE_NAME}:smoke" vi --version
          docker run --rm "${IMAGE_NAME}:smoke" sh -c 'test "$(id -u):$(id -g)" = "1000:1000"'
          docker run --rm "${IMAGE_NAME}:smoke" sh -c 'for key in /etc/ssh/ssh_host_*_key; do [ ! -e "$key" ] || exit 1; done'
          docker run --rm --user 0:0 "${IMAGE_NAME}:smoke" t3-sshd -t

          tmpdir="$(mktemp -d)"
          cid=""
          trap 'if [ -n "$cid" ]; then docker rm -f "$cid" >/dev/null 2>&1 || true; fi; rm -rf "$tmpdir"' EXIT
          ssh-keygen -q -t ed25519 -N '' -C smoke -f "$tmpdir/id_ed25519"
          cid="$(
            docker run -d --rm --user 0:0 \
              -e T3CODE_SSH_AUTHORIZED_KEYS="$(cat "$tmpdir/id_ed25519.pub")" \
              -p 127.0.0.1::2222 \
              "${IMAGE_NAME}:smoke" t3-sshd
          )"
          port="$(docker port "$cid" 2222/tcp | sed 's/.*://')"

          for i in $(seq 1 30); do
            if ssh \
              -o BatchMode=yes \
              -o StrictHostKeyChecking=no \
              -o UserKnownHostsFile="$tmpdir/known_hosts" \
              -i "$tmpdir/id_ed25519" \
              -p "$port" \
              t3@127.0.0.1 \
              'test "$HOME" = /home/t3 && test "$(id -u):$(id -g)" = "1000:1000"'
            then
              break
            fi
            sleep 1
          done

          ssh \
            -o BatchMode=yes \
            -o StrictHostKeyChecking=no \
            -o UserKnownHostsFile="$tmpdir/known_hosts" \
            -i "$tmpdir/id_ed25519" \
            -p "$port" \
            t3@127.0.0.1 \
            'test "$HOME" = /home/t3 && pwd'

          printf 'pwd\nquit\n' | sftp \
            -b - \
            -o BatchMode=yes \
            -o StrictHostKeyChecking=no \
            -o UserKnownHostsFile="$tmpdir/known_hosts" \
            -i "$tmpdir/id_ed25519" \
            -P "$port" \
            t3@127.0.0.1

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=t3-0.0.28-node-24.18.0-sshd
            type=sha,prefix=sha-,format=short
            type=raw,value=latest
          labels: |
            org.opencontainers.image.title=t3-code-server
            org.opencontainers.image.description=Official T3 Code headless server image for Kubernetes

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
