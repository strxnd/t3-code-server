name: image

on:
  push:
    branches:
      - main
    tags:
      - "*"
  pull_request:
  schedule:
    - cron: "23 3 * * 1"
  workflow_dispatch:

concurrency:
  group: image-${{ github.event_name == 'pull_request' && github.ref || 'publisher' }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  IMAGE_NAME: ghcr.io/strxnd/t3-code-server

jobs:
  validate:
    name: Validate image
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build validation image
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: ${{ env.IMAGE_NAME }}:smoke
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test image
        run: ./scripts/smoke-test-image.sh "${IMAGE_NAME}:smoke"

  publish:
    name: Build and publish image
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Resolve image version
        id: version
        run: |
          set -euo pipefail
          arg_version() {
            sed -n "s/^ARG $1=//p" Dockerfile
          }

          t3_version="$(arg_version T3_VERSION)"
          codex_version="$(arg_version CODEX_VERSION)"
          claude_version="$(arg_version CLAUDE_CODE_VERSION)"
          opencode_version="$(arg_version OPENCODE_VERSION)"
          gh_version="$(arg_version GH_VERSION)"
          node_version="$(sed -n 's/^FROM .*node:\([0-9][0-9.]*\)-.*$/\1/p' Dockerfile | head -n 1)"

          for version in \
            "$t3_version" \
            "$codex_version" \
            "$claude_version" \
            "$opencode_version" \
            "$gh_version" \
            "$node_version"
          do
            test -n "$version"
          done

          echo "tag=t3-${t3_version}-node-${node_version}-codex-${codex_version}-claude-${claude_version}-opencode-${opencode_version}-gh-${gh_version}-sshd" >> "$GITHUB_OUTPUT"

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ steps.version.outputs.tag }},enable=${{ github.event_name != 'schedule' }}
            type=sha,prefix=sha-,format=short,enable=${{ github.event_name != 'schedule' }}
            type=raw,value=rebuild-${{ github.run_id }},enable=${{ github.event_name == 'schedule' }}
            type=raw,value=latest
          labels: |
            org.opencontainers.image.title=t3-code-server
            org.opencontainers.image.description=Official T3 Code headless server image for Kubernetes

      - name: Build publishable image
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: |
            ${{ env.IMAGE_NAME }}:smoke
            ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          no-cache: ${{ github.event_name == 'schedule' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test image
        run: ./scripts/smoke-test-image.sh "${IMAGE_NAME}:smoke"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push tested image
        env:
          IMAGE_TAGS: ${{ steps.meta.outputs.tags }}
        run: |
          set -euo pipefail
          while IFS= read -r tag; do
            if [[ -n "$tag" ]]; then
              docker push "$tag"
            fi
          done <<< "$IMAGE_TAGS"
